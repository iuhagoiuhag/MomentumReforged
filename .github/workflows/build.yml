name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: ./gradlew build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MomentumReforged-${{ steps.version.outputs.version }}
          path: build/libs/momentumreforged-${{ steps.version.outputs.version }}.jar

      - name: Create release
        if: steps.tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            "build/libs/momentumreforged-${{ steps.version.outputs.version }}.jar"

      - name: Upload to Modrinth
        if: steps.tag.outputs.exists == 'false'
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_PAT }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          JAR="build/libs/momentumreforged-${VERSION}.jar"
          JAR_NAME="momentumreforged-${VERSION}.jar"

          MC_VERSION=$(grep '^minecraft_version=' gradle.properties | cut -d'=' -f2)

          DATA=$(cat <<EOF
          {
            "name": "v${VERSION}",
            "version_number": "${VERSION}",
            "version_type": "release",
            "game_versions": ["${MC_VERSION}"],
            "loaders": ["fabric"],
            "project_id": "IeYja5pu",
            "file_parts": ["${JAR_NAME}"],
            "dependencies": []
          }
          EOF
          )

          curl -X POST "https://api.modrinth.com/v2/version" \
            -H "Authorization: ${MODRINTH_TOKEN}" \
            -H "User-Agent: iuhagoiuhag/MomentumReforged/1.0" \
            -F "data=${DATA}" \
            -F "${JAR_NAME}=@${JAR}"

      - name: Bump patch version
        if: steps.tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          sed -i "s/^mod_version=.*/mod_version=${NEW_VERSION}/" gradle.properties
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "Bump version to ${NEW_VERSION} [skip ci]"
          git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git main
